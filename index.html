<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Clipboard Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-blue: #0ea5e9;
            --accent-hover: #0284c7;
            --warning-red: #ef4444;
            --success-green: #22c55e;
            --card-bg: rgba(255, 255, 255, 0.82);
            --border-color: #e2e8f0;
            --clipboard-bg: #f8fafc;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(-45deg, #0ea5e9, #8b5cf6, #3b82f6, #2dd4bf);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            height: 90vh;
        }

        h1, h2, .clipboard-header { 
            font-family: 'Poppins', sans-serif; 
            letter-spacing: -0.5px; 
        }

        .header-area {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-md);
        }

        .header-title h1 { margin: 0; font-size: 1.5em; color: #0f172a; }
        
        .dashboard-stats {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .stat-block { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.75em; text-transform: uppercase; color: var(--text-muted); font-weight: 600; }
        .stat-value { font-weight: 600; font-size: 1.1em; }

        .rapport-container { width: 150px; }
        .rapport-bar-bg { height: 10px; background: var(--border-color); border-radius: 5px; margin-top: 4px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .rapport-fill { height: 100%; width: 50%; background: var(--accent-blue); transition: width 0.3s ease, background 0.3s ease; }

        .btn-action {
            background: #f1f5f9;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .btn-action:hover { background: #e2e8f0; }

        #chat-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .wrapper-client { align-self: flex-start; }
        .wrapper-clinician { align-self: flex-end; }
        .wrapper-system { align-self: center; max-width: 100%; text-align: center; }

        .name-label { font-size: 0.75em; color: var(--text-muted); margin-bottom: 4px; margin-left: 4px; }
        .wrapper-clinician .name-label { text-align: right; margin-right: 4px; }

        .message { padding: 12px 16px; border-radius: 12px; font-size: 0.95em; line-height: 1.5; box-shadow: var(--shadow-sm); }
        .msg-client { background: #ffffff; border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
        .msg-clinician { background: linear-gradient(135deg, var(--accent-blue), #3b82f6); color: white; border-bottom-right-radius: 4px; border: none; }
        .msg-system { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; font-size: 0.85em; box-shadow: none; font-weight: 500; }
        
        .msg-system-win { 
            background: linear-gradient(135deg, var(--success-green), #16a34a);
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05em;
            text-align: center;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            animation: winPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes winPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #clipboard-container {
            background: var(--clipboard-bg);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-lg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .clipboard-header {
            background: linear-gradient(to right, #e2e8f0, #f1f5f9);
            padding: 15px;
            font-weight: 600;
            text-align: center;
            border-bottom: 1px solid #cbd5e1;
            color: #334155;
        }

        #clipboard-body {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .category-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }
        .category-btn:hover { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: var(--shadow-md); }

        .question-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            border-radius: 6px;
            text-align: left;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }
        .question-btn:hover { background: #f8fafc; border-color: #cbd5e1; transform: translateY(-1px); box-shadow: var(--shadow-md); }
        
        .cost-tag {
            font-size: 0.75em;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .cost-free { background: #dcfce7; color: #166534; }
        .cost-low { background: #fef9c3; color: #854d0e; }
        .cost-high { background: #fee2e2; color: #991b1b; }
        .cost-build { background: #dbeafe; color: #1e40af; } 

        .back-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            padding: 5px 0;
            text-align: left;
            margin-bottom: 10px;
        }
        .back-btn:hover { color: var(--text-main); }

        .diagnose-btn-container {
            padding: 15px;
            background: white;
            border-top: 1px solid var(--border-color);
        }
        .btn-diagnose {
            width: 100%;
            background: #0f172a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        .btn-diagnose:hover { background: #334155; transform: translateY(-2px); box-shadow: var(--shadow-lg); }

        #diagnose-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px);
            justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalPop 0.3s ease-out forwards;
        }
        @keyframes modalPop {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .modal-content h2 { margin-top: 0; color: #0f172a; }
        select { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 2px solid var(--border-color); font-family: inherit; font-size: 1em; outline: none; transition: border-color 0.2s; }
        select:focus { border-color: var(--accent-blue); }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btns button { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; border: none; transition: all 0.2s; }
        .btn-confirm { background: linear-gradient(135deg, var(--accent-blue), #3b82f6); color: white; box-shadow: var(--shadow-md); }
        .btn-confirm:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
        .btn-cancel { background: #e2e8f0; color: var(--text-main); }
        .btn-cancel:hover { background: #cbd5e1; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="header-title">
            <h1>Clinical Assessment</h1>
        </div>
        <div class="dashboard-stats">
            <div class="stat-block">
                <span class="stat-label">Patient</span>
                <span class="stat-value" id="patient-name">Loading...</span>
            </div>
            <div class="stat-block rapport-container">
                <span class="stat-label">Rapport Level</span>
                <div class="rapport-bar-bg"><div class="rapport-fill" id="rapport-fill"></div></div>
            </div>
            <div class="stat-block">
                <span class="stat-label">Questions Asked</span>
                <span class="stat-value"><span id="turn-count">0</span> / 12</span>
            </div>
            <div class="stat-block">
                <span class="stat-label">Case Progress</span>
                <span class="stat-value" id="case-tracker">0 of 0</span>
            </div>
            <button class="btn-action" id="btn-next" onclick="loadNextCase()">Next Case ⏭</button>
        </div>
    </div>

    <div id="chat-container"></div>

    <div id="clipboard-container">
        <div class="clipboard-header">Diagnostic Clipboard</div>
        <div id="clipboard-body"></div>
        <div class="diagnose-btn-container">
            <button class="btn-diagnose" onclick="openDiagnoseModal()">Submit Diagnosis</button>
        </div>
    </div>

    <div id="diagnose-modal">
        <div class="modal-content">
            <h2>Select Diagnosis</h2>
            <select id="diagnosis-select"></select>
            <div class="modal-btns">
                <button class="btn-confirm" onclick="submitDiagnosis()">Confirm</button>
                <button class="btn-cancel" onclick="closeDiagnoseModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CORE DATA & QUESTIONS ---
        const allDiagnoses = [
            "Major Depressive Disorder", "Generalized Anxiety Disorder", "Posttraumatic Stress Disorder", 
            "Schizophrenia", "Bipolar I Disorder", "Bipolar II Disorder", "Obsessive-Compulsive Disorder", 
            "Panic Disorder", "Borderline Personality Disorder", "Antisocial Personality Disorder",
            "Somatic Symptom Disorder", "Attention-Deficit/Hyperactivity Disorder", "Illness Anxiety Disorder",
            "Narcissistic Personality Disorder", "Social Anxiety Disorder"
        ];

        const caseDatabase = [
            // --- NEURODEVELOPMENTAL ---
            { diagnosis: "Autism Spectrum Disorder", persona: "Child", intro: "My son has always been a bit different. He struggles with making friends and gets really upset if his routine changes. We're here because his school suggested he might need some extra support.", answers: { validate_1: "Yes, it's a lot. He just doesn't connect with other kids.", validate_2: "It's hard to talk about. He's so particular about everything.", q_dep_1: "No, he seems happy in his own world.", q_dep_2: "He's always been like this, very focused on his toys.", q_mania_1: "No, just very intense about his routines.", q_anx_1: "He gets very upset if things change, but not generally worried.", q_panic_1: "Loud noises can really set him off.", q_trauma_1: "No, nothing like that.", q_sleep_1: "He sleeps well, but needs a very strict bedtime routine.", q_appetite_1: "He's a very picky eater, only certain textures.", q_focus_1: "He can focus for hours on his trains, but not on other things.", q_suicide_1: "Oh no, he's too young for that.", q_psych_1: "No, he just seems to be in his own world." } },
            { diagnosis: "Attention-Deficit/Hyperactivity Disorder", persona: "Child", intro: "My child is constantly on the go, can't sit still, and has a really hard time focusing in school. It's affecting his grades and he's always getting into trouble.", answers: { validate_1: "It's exhausting trying to keep up with him.", validate_2: "I'm worried about his grades.", q_dep_1: "No, he's usually very energetic.", q_dep_2: "He loses interest in things quickly.", q_mania_1: "He's always energetic, but not 'high'.", q_anx_1: "He worries about getting in trouble at school.", q_panic_1: "No, not panic attacks.", q_trauma_1: "No, nothing major.", q_sleep_1: "He has trouble settling down at night.", q_appetite_1: "He eats fine, but sometimes forgets to finish his meals.", q_focus_1: "Yes, he can't seem to concentrate on anything for long.", q_suicide_1: "No, he's a happy kid, just very active.", q_psych_1: "No, he just can't sit still." } },
            { diagnosis: "Tourette's Disorder", persona: "Child", intro: "My child has these sudden movements and sounds he can't control. They've been happening for over a year now, and it's starting to make him self-conscious.", answers: { validate_1: "It's been a tough year for him.", validate_2: "Thank you, it's hard to explain what's happening.", q_dep_1: "He gets frustrated, but not really depressed.", q_dep_2: "He still enjoys his video games.", q_mania_1: "No, his energy is normal.", q_anx_1: "He gets anxious about people noticing his tics.", q_panic_1: "No, not panic attacks.", q_trauma_1: "No, nothing like that.", q_sleep_1: "Sometimes his tics keep him from falling asleep.", q_appetite_1: "No changes.", q_focus_1: "He can focus, but the tics can be distracting.", q_suicide_1: "No, he just wants the tics to stop.", q_psych_1: "No, he's aware of his tics." } },
            { diagnosis: "Specific Learning Disorder", persona: "Child", intro: "My child is really struggling with reading, even though we've tried everything. He's a bright kid, but the words just don't seem to make sense to him on the page.", answers: { validate_1: "He tries so hard, but it's just not clicking.", validate_2: "I'm at my wit's end with his reading.", q_dep_1: "He's discouraged, but not deeply depressed.", q_dep_2: "He still loves sports.", q_mania_1: "No.", q_anx_1: "He gets very anxious about schoolwork.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "Normal.", q_appetite_1: "Normal.", q_focus_1: "He can focus on things he's good at, but reading is a struggle.", q_suicide_1: "No, he just feels dumb.", q_psych_1: "No." } },
            { diagnosis: "Intellectual Disability", persona: "Child", intro: "My daughter needs a lot of help with daily tasks and learning new things. She's always been a bit slower to develop, and we're looking for ways to support her best.", answers: { validate_1: "It's a daily struggle for her.", validate_2: "We just want to help her live as independently as possible.", q_dep_1: "She can get sad, but it's more about frustration.", q_dep_2: "She enjoys simple activities.", q_mania_1: "No.", q_anx_1: "She gets overwhelmed by new situations.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "She sleeps well.", q_appetite_1: "Normal.", q_focus_1: "She struggles with complex tasks.", q_suicide_1: "No, she doesn't understand that concept.", q_psych_1: "No." } },

            // --- SCHIZOPHRENIA SPECTRUM ---
            { diagnosis: "Schizophrenia", persona: "Adult", intro: "I've been hearing voices and seeing things that aren't there. It's been going on for months, and I feel like people are watching me. It's hard to think clearly.", answers: { validate_1: "It's a very confusing time for me.", validate_2: "I appreciate you listening.", q_dep_1: "I feel very flat, not really sad.", q_dep_2: "Nothing interests me anymore.", q_mania_1: "No, I feel drained.", q_anx_1: "I'm constantly on edge, like someone is watching me.", q_panic_1: "Sometimes, when the voices get loud.", q_trauma_1: "The voices tell me things happened.", q_sleep_1: "I barely sleep, the voices keep me awake.", q_appetite_1: "I forget to eat.", q_focus_1: "It's hard to think clearly with all the thoughts.", q_suicide_1: "The voices tell me to hurt myself sometimes.", q_psych_1: "Yes, I hear voices and see shadows." } },
            { diagnosis: "Schizoaffective Disorder", persona: "Adult", intro: "My mood swings are extreme, from feeling really low to incredibly high. And sometimes, even when my mood is stable, I still hear voices or have strange beliefs.", answers: { validate_1: "My mind is a mess.", validate_2: "It's good to have someone to talk to.", q_dep_1: "I've been in a deep depression for months.", q_dep_2: "I've lost all joy.", q_mania_1: "I had a period where I felt invincible, but that was a while ago.", q_anx_1: "Yes, constant worry.", q_panic_1: "Sometimes, when I feel overwhelmed.", q_trauma_1: "I've had some very disturbing experiences.", q_sleep_1: "Either too much or too little.", q_appetite_1: "I've gained a lot of weight.", q_focus_1: "It's hard to concentrate when my thoughts are racing or I'm so low.", q_suicide_1: "Yes, when I'm depressed, I think about it.", q_psych_1: "Yes, I hear voices even when I'm not depressed." } },
            { diagnosis: "Brief Psychotic Disorder", persona: "Adult", intro: "After a really stressful event, I started seeing and hearing things that weren't real. It was terrifying, but it only lasted a couple of weeks, and now it's mostly gone.", answers: { validate_1: "This is all so sudden.", validate_2: "I'm trying to understand what happened.", q_dep_1: "I was very distressed, but not depressed.", q_dep_2: "I was too confused to enjoy anything.", q_mania_1: "No.", q_anx_1: "I was terrified.", q_panic_1: "Yes, I had a few.", q_trauma_1: "I witnessed a terrible accident.", q_sleep_1: "I couldn't sleep for days.", q_appetite_1: "I lost my appetite.", q_focus_1: "I couldn't think straight.", q_suicide_1: "No.", q_psych_1: "Yes, I thought people were trying to get me, but it's gone now." } },
            { diagnosis: "Delusional Disorder", persona: "Adult", intro: "I know my neighbor is trying to poison me. Everyone says I'm imagining it, but I have proof. I just need someone to believe me.", answers: { validate_1: "It's frustrating when no one believes me.", validate_2: "I just want someone to take me seriously.", q_dep_1: "No, I'm just angry.", q_dep_2: "I still enjoy my hobbies.", q_mania_1: "No.", q_anx_1: "I'm anxious about my neighbor's actions.", q_panic_1: "No.", q_trauma_1: "My neighbor is persecuting me.", q_sleep_1: "I sleep fine.", q_appetite_1: "Normal.", q_focus_1: "I can focus perfectly, especially on gathering evidence.", q_suicide_1: "No.", q_psych_1: "No, I don't hear voices, I just know what's happening." } },

            // --- BIPOLAR ---
            { diagnosis: "Bipolar I Disorder", persona: "Adult", intro: "I've been on top of the world lately! So much energy, so many ideas, barely sleeping. But then I crash hard. It's a rollercoaster.", answers: { validate_1: "I'm on top of the world!", validate_2: "I don't need help, I'm amazing!", q_dep_1: "Depressed? Me? Never!", q_dep_2: "I have so many new interests, I can't keep up!", q_mania_1: "Yes! I've been feeling incredible, like I can do anything!", q_anx_1: "No, I feel powerful.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "Who needs sleep when there's so much to do?", q_appetite_1: "I forget to eat, too busy.", q_focus_1: "My thoughts are racing, I'm so productive!", q_suicide_1: "No, I'm too important.", q_psych_1: "Sometimes I feel like I have special powers." } },
            { diagnosis: "Bipolar II Disorder", persona: "Adult", intro: "I have these intense periods of depression, but also times when I feel really productive and energetic, though not completely out of control. It's hard to manage.", answers: { validate_1: "I'm so tired of feeling this way.", validate_2: "It's hard to keep going.", q_dep_1: "Yes, I've been in a deep hole for weeks.", q_dep_2: "Nothing brings me joy.", q_mania_1: "I had a few days where I felt really good, very productive, but it wasn't like a full-blown high.", q_anx_1: "Yes, I worry about everything.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "I either sleep too much or can't sleep at all.", q_appetite_1: "I've been overeating.", q_focus_1: "It's hard to focus when I'm so down.", q_suicide_1: "Yes, I've had thoughts.", q_psych_1: "No." } },

            // --- DEPRESSIVE ---
            { diagnosis: "Major Depressive Disorder", persona: "Adult", intro: "I just feel so empty and sad all the time. Nothing brings me joy anymore, and it's hard to even get out of bed in the morning.", answers: { validate_1: "I just feel so empty.", validate_2: "It's hard to even get out of bed.", q_dep_1: "Yes, every single day.", q_dep_2: "Nothing interests me anymore, not even my dog.", q_mania_1: "No, never felt that way.", q_anx_1: "Sometimes, but mostly just sadness.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "I sleep all the time but I'm still tired.", q_appetite_1: "I've lost my appetite and some weight.", q_focus_1: "Yes, my mind feels foggy.", q_suicide_1: "Yes, I've thought about it a lot.", q_psych_1: "No." } },
            { diagnosis: "Persistent Depressive Disorder", persona: "Adult", intro: "I've felt a low-level sadness for as long as I can remember. It's not as intense as some people describe depression, but it's always there, like a constant gray cloud.", answers: { validate_1: "This is just how I am.", validate_2: "I've felt this way for as long as I can remember.", q_dep_1: "Yes, most days, for years.", q_dep_2: "I have moments of joy, but mostly just a low hum of sadness.", q_mania_1: "No.", q_anx_1: "I worry, but it's not overwhelming.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "I'm always tired.", q_appetite_1: "Normal.", q_focus_1: "Sometimes it's hard to concentrate.", q_suicide_1: "No, I just feel numb.", q_psych_1: "No." } },

            // --- ANXIETY ---
            { diagnosis: "Generalized Anxiety Disorder", persona: "Adult", intro: "I'm constantly worrying about everything – my job, my family, the news. My mind just races, and I can't seem to turn it off. I'm always on edge.", answers: { validate_1: "I'm constantly worried about everything.", validate_2: "It's exhausting to always be on edge.", q_dep_1: "Sometimes, when the worry gets too much.", q_dep_2: "I can't relax enough to enjoy things.", q_mania_1: "No.", q_anx_1: "Yes, about my job, my family, the news, everything.", q_panic_1: "No, not full panic attacks.", q_trauma_1: "No.", q_sleep_1: "I have trouble falling asleep because my mind races.", q_appetite_1: "Normal.", q_focus_1: "It's hard to focus when I'm so distracted by worry.", q_suicide_1: "No.", q_psych_1: "No." } },
            { diagnosis: "Panic Disorder", persona: "Adult", intro: "I've been having these sudden, terrifying attacks where my heart races, I can't breathe, and I feel like I'm dying. I'm so scared they'll happen again that I avoid going out.", answers: { validate_1: "I thought I was dying.", validate_2: "I'm terrified it will happen again.", q_dep_1: "I'm scared, not depressed.", q_dep_2: "I can't enjoy anything because I'm always waiting for the next attack.", q_mania_1: "No.", q_anx_1: "Yes, I'm constantly worried about having another attack.", q_panic_1: "Yes, out of the blue, my heart races, I can't breathe.", q_trauma_1: "No.", q_sleep_1: "I'm afraid to sleep.", q_appetite_1: "I've lost my appetite.", q_focus_1: "It's hard to focus when I'm so hyper-aware of my body.", q_suicide_1: "No.", q_psych_1: "No." } },
            { diagnosis: "Social Anxiety Disorder", persona: "Adult", intro: "I get incredibly anxious in social situations. I'm terrified of being judged or saying the wrong thing. It's so bad I often avoid parties or even eating in front of others.", answers: { validate_1: "It's so hard to be around people.", validate_2: "I just want to disappear.", q_dep_1: "I get sad when I think about how isolated I am.", q_dep_2: "I can't enjoy social events.", q_mania_1: "No.", q_anx_1: "Yes, especially before social gatherings.", q_panic_1: "Sometimes, in a crowd.", q_trauma_1: "No.", q_sleep_1: "I worry about social events, so I don't sleep well.", q_appetite_1: "I can't eat in front of others.", q_focus_1: "It's hard to focus when I'm so self-conscious.", q_suicide_1: "No.", q_psych_1: "No." } },
            { diagnosis: "Posttraumatic Stress Disorder", persona: "Adult", intro: "After what happened, I can't stop reliving it. I have nightmares, flashbacks, and I'm constantly on alert, always looking over my shoulder.", answers: { validate_1: "It feels like it just happened yesterday.", validate_2: "I can't escape the memories.", q_dep_1: "Yes, I feel numb and sad.", q_dep_2: "I used to love hiking, but now I can't go outside.", q_mania_1: "No.", q_anx_1: "I'm always on alert, hypervigilant.", q_panic_1: "Yes, when I have flashbacks.", q_trauma_1: "Yes, I was in a terrible accident.", q_sleep_1: "Nightmares every night.", q_appetite_1: "I've lost weight.", q_focus_1: "It's hard to concentrate with the intrusive thoughts.", q_suicide_1: "Yes, sometimes I wish it would all end.", q_psych_1: "Sometimes I feel like I'm back there." } },

            // --- OCD & RELATED ---
            { diagnosis: "Obsessive-Compulsive Disorder", persona: "Adult", intro: "My mind is filled with intrusive thoughts, and I feel compelled to do certain rituals to make them go away. I know it's irrational, but I can't stop washing my hands or checking things.", answers: { validate_1: "My mind won't stop.", validate_2: "I know it's irrational, but I can't help it.", q_dep_1: "I get very distressed, but not depressed.", q_dep_2: "My rituals take up all my time.", q_mania_1: "No.", q_anx_1: "Yes, constant anxiety about my obsessions.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "It's hard to sleep when I'm doing my rituals.", q_appetite_1: "Normal.", q_focus_1: "It's hard to focus on anything else.", q_suicide_1: "No.", q_psych_1: "No." } },

            // --- PERSONALITY DISORDERS ---
            { diagnosis: "Borderline Personality Disorder", persona: "Adult", intro: "My emotions are all over the place. One minute I'm fine, the next I'm furious or incredibly sad. I'm terrified of being abandoned, and my relationships are a mess.", answers: { validate_1: "I feel so alone, but then I push everyone away.", validate_2: "My emotions are all over the place.", q_dep_1: "Yes, I swing between intense sadness and anger.", q_dep_2: "I can't maintain interest in anything.", q_mania_1: "I have intense mood swings, but not full mania.", q_anx_1: "Yes, especially about being abandoned.", q_panic_1: "Sometimes, when I feel overwhelmed.", q_trauma_1: "Yes, a lot of childhood trauma.", q_sleep_1: "Very erratic sleep.", q_appetite_1: "I either starve myself or binge.", q_focus_1: "It's hard to focus when my emotions are so intense.", q_suicide_1: "Yes, I self-harm when I feel overwhelmed.", q_psych_1: "Sometimes I feel disconnected from reality." } },
            { diagnosis: "Antisocial Personality Disorder", persona: "Adult", intro: "I'm here because someone told me to be. I don't really see what the big deal is. I do what I want, and I don't let anyone get in my way.", answers: { validate_1: "I don't see what the big deal is.", validate_2: "I'm here because someone else thinks I should be.", q_dep_1: "No, I don't get depressed.", q_dep_2: "I enjoy getting what I want.", q_mania_1: "No.", q_anx_1: "I don't worry about things.", q_panic_1: "No.", q_trauma_1: "I've been in some tough situations, but I handle it.", q_sleep_1: "I sleep fine.", q_appetite_1: "Normal.", q_focus_1: "I can focus when it benefits me.", q_suicide_1: "No.", q_psych_1: "No." } },
            { diagnosis: "Narcissistic Personality Disorder", persona: "Adult", intro: "It's difficult when people don't recognize my unique talents and importance. I'm a very special individual, and I deserve to be treated as such.", answers: { validate_1: "It's hard when people don't recognize my talent.", validate_2: "I'm a very important person.", q_dep_1: "I get angry when I'm not appreciated, but not depressed.", q_dep_2: "I enjoy being admired.", q_mania_1: "I always feel superior.", q_anx_1: "I worry about my image.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "Normal.", q_appetite_1: "Normal.", q_focus_1: "I can focus on my goals.", q_suicide_1: "No.", q_psych_1: "No." } },

            // --- SOMATIC ---
            { diagnosis: "Somatic Symptom Disorder", persona: "Adult", intro: "I have this constant pain, and no one seems to believe how much I'm suffering. Doctors can't find anything wrong, but I know something is seriously wrong with my body.", answers: { validate_1: "The pain is unbearable.", validate_2: "No one believes how much I'm suffering.", q_dep_1: "Yes, I'm constantly worried about my health.", q_dep_2: "I can't enjoy anything because of the pain.", q_mania_1: "No.", q_anx_1: "Yes, constant health anxiety.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "The pain keeps me awake.", q_appetite_1: "I've lost my appetite.", q_focus_1: "It's hard to focus on anything but my symptoms.", q_suicide_1: "Sometimes, to escape the pain.", q_psych_1: "No." } },
            { diagnosis: "Illness Anxiety Disorder", persona: "Adult", intro: "I'm constantly worried that I have a serious illness, even though doctors keep telling me I'm fine. Every little ache or pain makes me think the worst.", answers: { validate_1: "I just know something is wrong with me.", validate_2: "I've seen so many doctors, but they miss something.", q_dep_1: "I'm constantly worried about getting sick.", q_dep_2: "I can't enjoy life because I'm always checking for symptoms.", q_mania_1: "No.", q_anx_1: "Yes, constant, severe health anxiety.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "I can't sleep because I'm worried about my health.", q_appetite_1: "Normal.", q_focus_1: "It's hard to focus on anything else.", q_suicide_1: "No.", q_psych_1: "No." } },

            // --- ADHD ---
            { diagnosis: "Attention-Deficit/Hyperactivity Disorder", persona: "Adult", intro: "My life feels like a constant scramble. I can't focus at work, I forget appointments, and I'm always restless. It's hard to get anything done.", answers: { validate_1: "My life feels like a constant scramble.", validate_2: "I can't seem to get anything done.", q_dep_1: "Yes, I get overwhelmed and sad.", q_dep_2: "I start many projects but finish none.", q_mania_1: "No, just restless.", q_anx_1: "Yes, about missing deadlines and forgetting things.", q_panic_1: "No.", q_trauma_1: "No.", q_sleep_1: "My mind races at night.", q_appetite_1: "I forget to eat sometimes.", q_focus_1: "Yes, I can't sustain attention on tasks.", q_suicide_1: "No.", q_psych_1: "No." } }
        ];

        const clinicalQuestions = {
            "Build Rapport": [
                { id: "validate_1", text: "It sounds like you are carrying a lot right now.", cost: -15, type: "build" }, 
                { id: "validate_2", text: "Thank you for coming in today, I know it can be difficult.", cost: -10, type: "build" }
            ],
            "Mood & Affect": [
                { id: "q_dep_1", text: "Have you been feeling down, depressed, or hopeless?", cost: 0, type: "free" },
                { id: "q_dep_2", text: "Have you lost interest or pleasure in things you usually enjoy?", cost: 0, type: "free" },
                { id: "q_mania_1", text: "Have you had periods where you felt unusually energetic or 'high'?", cost: 5, type: "low" }
            ],
            "Anxiety & Stress": [
                { id: "q_anx_1", text: "Do you find yourself worrying excessively about various things?", cost: 0, type: "free" },
                { id: "q_panic_1", text: "Have you experienced sudden, intense panic attacks?", cost: 0, type: "free" },
                { id: "q_trauma_1", text: "Have you experienced any severe trauma or life-threatening events?", cost: 20, type: "high" }
            ],
            "Physical Symptoms": [
                { id: "q_sleep_1", text: "How has your sleep been lately?", cost: 0, type: "free" },
                { id: "q_appetite_1", text: "Have you noticed any significant changes in your appetite or weight?", cost: 0, type: "free" },
                { id: "q_focus_1", text: "Are you having trouble concentrating on tasks?", cost: 0, type: "free" }
            ],
            "Risk Assessment": [
                { id: "q_suicide_1", text: "Are you having any thoughts of hurting yourself or ending your life?", cost: 30, type: "high" },
                { id: "q_psych_1", text: "Have you been seeing or hearing things that other people do not?", cost: 25, type: "high" }
            ]
        };

        // --- 2. GAME STATE (Queue System) ---
        let state = {
            currentCase: null,
            rapport: 40,
            turns: 0,
            maxTurns: 12,
            askedQuestions: []
        };
        let caseQueue = []; 
        let currentCaseIndex = 0; 

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initApp() {
            // Create shuffled queue [0 to 14]
            caseQueue = Array.from({length: caseDatabase.length}, (_, i) => i);
            shuffleArray(caseQueue);
            currentCaseIndex = 0;
            
            // Populate Dropdown alphabetically
            const select = document.getElementById("diagnosis-select");
            select.innerHTML = '<option value="">-- Choose Diagnosis --</option>';
            [...allDiagnoses].sort().forEach(dx => select.appendChild(new Option(dx, dx)));

            loadNextCase();
        }

        function loadNextCase() {
            if (currentCaseIndex >= caseQueue.length) {
                document.getElementById("clipboard-body").innerHTML = "<h3 style='text-align:center;'>All Cases Completed!</h3><p style='text-align:center;'>Refresh the web page to shuffle the deck and play again.</p>";
                document.querySelector('.btn-diagnose').style.display = 'none';
                document.getElementById('btn-next').style.display = 'none';
                return;
            }

            const actualIndexInDatabase = caseQueue[currentCaseIndex];
            state.currentCase = caseDatabase[actualIndexInDatabase];

            state.rapport = 40;
            state.turns = 0;
            state.askedQuestions = [];
            
            document.getElementById("patient-name").innerText = `Patient (${state.currentCase.persona})`;
            document.getElementById("chat-container").innerHTML = ""; 
            document.querySelector('.btn-diagnose').style.display = 'block'; 

            currentCaseIndex++; // Update pointer for tracker
            updateDashboard();
            renderClipboardHome();
            
            addSystemMessage(`INTAKE NOTE: Patient presents for initial assessment.`);
            setTimeout(() => {
                addClientMessage(state.currentCase.intro);
            }, 600);
        }

        // --- 3. UI UPDATES ---
        function updateDashboard() {
            document.getElementById("turn-count").innerText = state.turns;
            const fill = document.getElementById("rapport-fill");
            fill.style.width = `${Math.max(0, Math.min(100, state.rapport))}%`;
            
            if(state.rapport < 30) fill.style.backgroundColor = "var(--warning-red)";
            else if(state.rapport > 70) fill.style.backgroundColor = "var(--success-green)";
            else fill.style.backgroundColor = "var(--accent-blue)";

            document.getElementById("case-tracker").innerText = `${currentCaseIndex} of ${caseDatabase.length}`;
        }

        function addClientMessage(text) {
            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="message-wrapper wrapper-client"><div class="name-label">Patient</div><div class="message msg-client">${text}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function addClinicianMessage(text) {
            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="message-wrapper wrapper-clinician"><div class="name-label">You</div><div class="message msg-clinician">${text}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function addSystemMessage(text) {
            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="message-wrapper wrapper-system"><div class="message msg-system">${text}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function addWinningMessage(text) {
            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="message-wrapper wrapper-system"><div class="msg-system-win">${text}</div></div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        // --- 4. CLIPBOARD LOGIC ---
        function renderClipboardHome() {
            const body = document.getElementById("clipboard-body");
            body.innerHTML = "<p style='margin-top:0; font-size:0.85em; color:var(--text-muted);'>Select a category to investigate.</p>";
            
            Object.keys(clinicalQuestions).forEach(category => {
                let btn = document.createElement("button");
                btn.className = "category-btn";
                btn.innerHTML = `${category} <span>→</span>`;
                btn.onclick = () => renderCategory(category);
                body.appendChild(btn);
            });
        }

        function renderCategory(category) {
            const body = document.getElementById("clipboard-body");
            body.innerHTML = `<button class="back-btn" onclick="renderClipboardHome()">← Back to Categories</button>`;
            
            clinicalQuestions[category].forEach(q => {
                if (state.askedQuestions.includes(q.id)) return;

                let btn = document.createElement("button");
                btn.className = "question-btn";
                
                let costLabel = "Free"; let costClass = "cost-free";
                if (q.type === "low") { costLabel = "Low Risk"; costClass = "cost-low"; }
                if (q.type === "high") { costLabel = "High Risk"; costClass = "cost-high"; }
                if (q.type === "build") { costLabel = "Build Rapport"; costClass = "cost-build"; }

                btn.innerHTML = `<span>${q.text}</span> <span class="cost-tag ${costClass}">${costLabel}</span>`;
                btn.onclick = () => askQuestion(q);
                body.appendChild(btn);
            });

            if(body.children.length === 1) { 
                 body.innerHTML += "<p style='text-align:center; color:var(--text-muted); font-size:0.9em; margin-top:20px;'>All questions in this category asked.</p>";
            }
        }

        function askQuestion(q) {
            if (state.turns >= state.maxTurns) return alert("Out of time. Please submit a diagnosis.");

            if (q.cost > 0 && state.rapport < q.cost * 1.5) { 
                 addClinicianMessage(q.text);
                 addSystemMessage("⚠️ Patient is defensive. You need to build more rapport to ask this.");
                 setTimeout(() => addClientMessage("Why are you asking me that? I don't want to talk about that right now."), 500);
                 
                 state.rapport -= 5; 
                 state.turns++;
                 updateDashboard();
                 return;
            }

            addClinicianMessage(q.text);
            state.askedQuestions.push(q.id);
            state.turns++;
            
            // Accurately deduct or add rapport, capping between 0 and 100
            if (q.cost < 0) {
                state.rapport = Math.min(100, state.rapport + Math.abs(q.cost));
            } else if (q.cost > 0) {
                state.rapport = Math.max(0, state.rapport - q.cost);
            }
            
            updateDashboard();
            renderClipboardHome(); 

            const answer = state.currentCase.answers[q.id] || "I don't know what to say to that.";
            setTimeout(() => addClientMessage(answer), 600);
        }

        // --- 5. DIAGNOSIS MODAL ---
        function openDiagnoseModal() { document.getElementById("diagnose-modal").style.display = "flex"; }
        function closeDiagnoseModal() { document.getElementById("diagnose-modal").style.display = "none"; }

        function submitDiagnosis() {
            const guess = document.getElementById("diagnosis-select").value;
            if (!guess) return alert("Please select a diagnosis.");
            
            closeDiagnoseModal();
            
            // End case state
            document.getElementById("clipboard-body").innerHTML = "<p style='text-align:center; color:var(--text-muted); margin-top:20px;'>Case complete. Click Next Case to continue.</p>";
            document.querySelector('.btn-diagnose').style.display = 'none';

            if (guess === state.currentCase.diagnosis) {
                addWinningMessage(`🎉 Correct! The diagnosis is ${state.currentCase.diagnosis}!`);
                if (typeof confetti === 'function') {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#22c55e', '#0ea5e9', '#f59e0b', '#8b5cf6'] });
                }
            } else {
                addSystemMessage(`❌ Incorrect. You chose ${guess}, but the correct diagnosis was <strong>${state.currentCase.diagnosis}</strong>.`);
            }
        }

        window.onload = initApp; 
    </script>
</body>
</html>
